name: Deploy React App to Cloudflare R2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-r2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      BUILD_DIR: dist # CRA면 build 로 변경

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build React app
        run: npm run build

      - name: Configure AWS CLI credentials for R2
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region "auto"
          aws configure set default.output "json"

      - name: Upload static assets to R2
        run: |
          aws s3 sync "$BUILD_DIR" "s3://$R2_BUCKET" \
            --endpoint-url "$R2_ENDPOINT" \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html with no-cache
        run: |
          aws s3 cp "$BUILD_DIR/index.html" "s3://$R2_BUCKET/index.html" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
