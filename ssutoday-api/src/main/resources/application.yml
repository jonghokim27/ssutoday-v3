spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    database: mysql
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: false
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-request-size: 50MB
      max-file-size: 50MB
  jwt:
    secret: ${JWT_SECRET_KEY}
  client:
    key: ${CLIENT_KEY}
  kafka:
    bootstrap-servers: ${KAFKA_HOST}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      auto-offset-reset: latest
      group-id: spring
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL:}

server:
  port: 80

logging:
  level:
    kr.ac.ssu.ssutoday: info

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    stack:
      auto: false

ssutoday:
  recaptcha:
    secret-key: ${RECAPTCHA_SECRET_KEY}
    minimum-score: ${RECAPTCHA_MINIMUM_SCORE:0.5}
    allowed-hostnames: ${RECAPTCHA_ALLOWED_HOSTNAMES:}
