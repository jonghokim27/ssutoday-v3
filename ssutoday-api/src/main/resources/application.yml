spring:
  application:
    name: api
  config:
    import: classpath:common.yml
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  jpa:
    open-in-view: false
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-request-size: 50MB
      max-file-size: 50MB

server:
  port: ${API_PORT:8080}

