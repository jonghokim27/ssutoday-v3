spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    database: mysql
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: ${TIME_ZONE:Asia/Seoul}
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  jackson:
    time-zone: ${TIME_ZONE:Asia/Seoul}
  kafka:
    bootstrap-servers: ${KAFKA_HOST}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  jwt:
    secret: ${JWT_SECRET_KEY}

  discord:
    error-webhook-url: ${DISCORD_ERROR_WEBHOOK_URL:}
    verify-photo-webhook-url: ${DISCORD_VERIFYPHOTO_WEBHOOK_URL:}

logging:
  level:
    kr.ac.ssu.ssutoday: info

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    s3:
      endpoint: ${AWS_S3_ENDPOINT}
      region: ${AWS_S3_REGION}
    stack:
      auto: false

ssutoday:
  admin:
    base-url: ${ADMIN_BASE_URL:}
  turnstile:
    secret-key: ${TURNSTILE_SECRET_KEY:}
  kafka:
    topics:
      push-message: ${PUSH_MESSAGE_TOPIC:pushMessage}
      reservation-request: ${RESERVATION_REQUEST_TOPIC:requestReserve}
